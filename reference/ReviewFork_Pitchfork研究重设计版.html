<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTRGAME REVIEW - 杂志级评分系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --rf-red: #ff3530;
      --rf-black: #0a0a0a;
      --rf-paper: #f4f4f4;
      --rf-paper-warm: #fafafa;
      --rf-white: #ffffff;
      --rf-ink-muted: #676767;
      --rf-ink-soft: #9a9a9a;
      --rf-border: #d9d9d9;
      --rf-border-dark: #111111;
      --rf-shadow-soft: 0 12px 35px rgba(10, 10, 10, 0.08);
      --rf-shadow-hard: 8px 8px 0 rgba(10, 10, 10, 0.95);
      --rf-radius: 6px;
      --rf-ease: cubic-bezier(.2, .8, .2, 1);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(10,10,10,0.025) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(0deg, rgba(10,10,10,0.02) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--rf-paper);
      color: var(--rf-black);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
      padding-bottom: 48px;
      selection-color: var(--rf-white);
      selection-background: var(--rf-red);
    }

    ::selection { background: var(--rf-red); color: var(--rf-white); }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #ededed; }
    ::-webkit-scrollbar-thumb {
      background: #bdbdbd;
      border: 2px solid #ededed;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover { background: #8f8f8f; }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .62; }

    .rf-topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 22px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 3px solid var(--rf-black);
      box-shadow: 0 8px 18px rgba(10,10,10,0.08);
      backdrop-filter: blur(10px);
    }

    .rf-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 210px;
    }

    .rf-brand-mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      color: var(--rf-white);
      background: var(--rf-red);
      border: 2px solid var(--rf-black);
      font-size: 16px;
      font-weight: 950;
      transform: rotate(-8deg);
      box-shadow: 3px 3px 0 var(--rf-black);
    }

    .rf-brand-name {
      display: flex;
      flex-direction: column;
      line-height: 1;
      font-weight: 950;
      text-transform: uppercase;
    }

    .rf-brand-name small {
      margin-top: 4px;
      color: var(--rf-ink-muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .rf-mode-switcher {
      display: grid;
      grid-template-columns: repeat(4, minmax(92px, 1fr));
      gap: 4px;
      width: min(620px, 100%);
      padding: 4px;
      background: #e9e9e9;
      border: 1px solid var(--rf-border);
      border-radius: var(--rf-radius);
      box-shadow: inset 0 1px 8px rgba(10,10,10,0.08);
    }

    .rf-mode-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 0 12px;
      color: var(--rf-ink-muted);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      transition: transform 160ms var(--rf-ease), color 160ms var(--rf-ease), background 160ms var(--rf-ease), border-color 160ms var(--rf-ease), box-shadow 160ms var(--rf-ease);
    }

    .rf-mode-button:hover {
      color: var(--rf-black);
      background: rgba(255,255,255,0.72);
      border-color: #cfcfcf;
    }

    .rf-mode-button:active { transform: translateY(1px) scale(.985); }
    .rf-mode-button.active {
      color: var(--rf-black);
      background: var(--rf-white);
      border-color: var(--rf-black);
      box-shadow: 3px 3px 0 var(--rf-black);
    }

    .rf-layout {
      width: min(1580px, calc(100vw - 28px));
      margin: 28px auto 0;
      display: grid;
      grid-template-columns: minmax(360px, 486px) minmax(820px, 1fr);
      gap: 28px;
      align-items: start;
    }

    .rf-workbench {
      position: sticky;
      top: 88px;
      max-height: calc(100vh - 108px);
      overflow: auto;
      background: var(--rf-white);
      border: 1px solid var(--rf-border);
      border-top: 5px solid var(--rf-black);
      border-radius: var(--rf-radius);
      box-shadow: var(--rf-shadow-soft);
    }

    .rf-workbench-head {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px 16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.94)),
        var(--rf-white);
      border-bottom: 3px solid var(--rf-black);
      backdrop-filter: blur(10px);
    }

    .rf-workbench-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .rf-workbench-title h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      line-height: 1;
    }

    .rf-sync {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      color: var(--rf-ink-muted);
      font-size: 11px;
      font-weight: 850;
    }

    .rf-sync-dot {
      width: 7px;
      height: 7px;
      background: #1f9d55;
      border-radius: 999px;
      box-shadow: 0 0 0 3px rgba(31,157,85,.12);
    }

    .rf-sync.editing .rf-sync-dot {
      background: var(--rf-red);
      box-shadow: 0 0 0 3px rgba(255,53,48,.14);
      animation: rf-pulse 700ms var(--rf-ease) infinite;
    }

    .rf-control-score {
      min-width: 94px;
      text-align: right;
      transition: opacity 180ms var(--rf-ease), transform 180ms var(--rf-ease);
    }

    .rf-control-score small {
      display: block;
      margin-bottom: 3px;
      color: var(--rf-ink-soft);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .rf-control-score strong {
      color: var(--rf-red);
      font-size: 32px;
      line-height: .9;
      font-weight: 950;
    }

    .rf-workbench-body {
      display: grid;
      gap: 16px;
      padding: 18px;
    }

    .rf-panel {
      background: linear-gradient(180deg, #fff, #fbfbfb);
      border: 1px solid var(--rf-border);
      border-radius: var(--rf-radius);
      box-shadow: 0 1px 0 rgba(255,255,255,.9), 0 10px 20px rgba(10,10,10,0.035);
      transition: border-color 160ms var(--rf-ease), box-shadow 160ms var(--rf-ease), transform 160ms var(--rf-ease);
    }

    .rf-panel:hover {
      border-color: #c5c5c5;
      box-shadow: 0 1px 0 rgba(255,255,255,.9), 0 13px 24px rgba(10,10,10,0.055);
    }

    .rf-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--rf-border);
      background: #f7f7f7;
    }

    .rf-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .rf-panel-note {
      color: var(--rf-ink-soft);
      font-size: 10px;
      font-weight: 850;
      white-space: nowrap;
    }

    .rf-panel-body {
      display: grid;
      gap: 13px;
      padding: 14px;
    }

    .rf-grid-2 {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .rf-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .rf-field label {
      color: var(--rf-ink-muted);
      font-size: 11px;
      font-weight: 900;
    }

    .rf-input,
    .rf-textarea {
      width: 100%;
      min-width: 0;
      color: var(--rf-black);
      background: #fff;
      border: 1px solid var(--rf-border);
      border-radius: 4px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(10,10,10,0.02);
      transition: border-color 150ms var(--rf-ease), box-shadow 150ms var(--rf-ease), background 150ms var(--rf-ease), transform 150ms var(--rf-ease);
    }

    .rf-input {
      height: 40px;
      padding: 0 11px;
      font-size: 13px;
    }

    .rf-textarea {
      min-height: 150px;
      padding: 11px;
      resize: vertical;
      line-height: 1.68;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
    }

    .rf-input:hover,
    .rf-textarea:hover {
      border-color: #bdbdbd;
      background: #fcfcfc;
    }

    .rf-input:focus,
    .rf-textarea:focus {
      border-color: var(--rf-black);
      box-shadow: 0 0 0 3px rgba(255,53,48,.12);
      background: #fff;
    }

    .rf-input.emphasis {
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-style: italic;
      font-weight: 850;
    }

    .rf-button,
    .rf-icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 4px;
      border: 1px solid var(--rf-border);
      background: var(--rf-white);
      color: var(--rf-black);
      font-weight: 900;
      transition: transform 150ms var(--rf-ease), box-shadow 150ms var(--rf-ease), color 150ms var(--rf-ease), background 150ms var(--rf-ease), border-color 150ms var(--rf-ease);
    }

    .rf-button {
      min-height: 40px;
      padding: 0 14px;
      font-size: 12px;
      text-transform: uppercase;
    }

    .rf-button:hover {
      border-color: var(--rf-black);
      box-shadow: 3px 3px 0 var(--rf-black);
      transform: translate(-1px, -1px);
    }

    .rf-button:active {
      box-shadow: 1px 1px 0 var(--rf-black);
      transform: translate(0, 0) scale(.985);
    }

    .rf-button.primary {
      color: var(--rf-white);
      background: var(--rf-red);
      border-color: var(--rf-red);
    }

    .rf-button.primary:hover {
      background: var(--rf-black);
      border-color: var(--rf-black);
    }

    .rf-button.ghost {
      background: #f8f8f8;
      border-style: dashed;
      color: var(--rf-ink-muted);
    }

    .rf-icon-button {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      color: var(--rf-ink-muted);
      background: #fff;
    }

    .rf-icon-button:hover {
      color: var(--rf-black);
      border-color: var(--rf-black);
      box-shadow: 2px 2px 0 var(--rf-black);
    }

    .rf-icon-button.danger:hover {
      color: var(--rf-white);
      background: var(--rf-red);
      border-color: var(--rf-red);
      box-shadow: 2px 2px 0 var(--rf-black);
    }

    .rf-upload-card {
      position: relative;
      display: grid;
      grid-template-columns: 94px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      min-height: 92px;
      padding: 10px;
      background: #f8f8f8;
      border: 1px dashed #bfbfbf;
      border-radius: 5px;
      transition: border-color 150ms var(--rf-ease), background 150ms var(--rf-ease), transform 150ms var(--rf-ease);
    }

    .rf-upload-card:hover {
      background: #fff;
      border-color: var(--rf-black);
      transform: translateY(-1px);
    }

    .rf-upload-preview {
      width: 94px;
      height: 72px;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #e9e9e9;
      border: 1px solid var(--rf-border);
      border-radius: 4px;
    }

    .rf-upload-preview img,
    .rf-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .rf-list {
      display: grid;
      gap: 10px;
    }

    .rf-list-card {
      position: relative;
      display: grid;
      gap: 10px;
      padding: 11px;
      background: #fff;
      border: 1px solid var(--rf-border);
      border-radius: 5px;
      box-shadow: 0 4px 12px rgba(10,10,10,0.035);
      transition: transform 160ms var(--rf-ease), box-shadow 160ms var(--rf-ease), border-color 160ms var(--rf-ease), background 160ms var(--rf-ease);
    }

    .rf-list-card:hover {
      border-color: var(--rf-black);
      box-shadow: 4px 4px 0 rgba(10,10,10,.85);
      transform: translate(-1px, -1px);
    }

    .rf-list-card.is-dragging {
      opacity: .55;
      transform: rotate(-.5deg) scale(.99);
    }

    .rf-list-card.is-drop-target {
      border-color: var(--rf-red);
      box-shadow: 4px 4px 0 var(--rf-red);
    }

    .rf-list-card.is-new { animation: rf-enter 420ms var(--rf-ease) both; }
    .rf-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .rf-drag-handle {
      width: 24px;
      color: var(--rf-ink-soft);
      display: inline-flex;
      justify-content: center;
      cursor: grab;
    }

    .rf-character-card .rf-drag-handle { display: none; }

    .rf-drag-handle:active { cursor: grabbing; }
    .rf-number {
      min-width: 28px;
      color: var(--rf-ink-soft);
      font-size: 12px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .rf-thumb {
      position: relative;
      width: 58px;
      height: 58px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #ededed;
      border: 1px solid var(--rf-border);
      border-radius: 4px;
    }

    .rf-thumb.large {
      width: 84px;
      height: 92px;
    }

    .rf-thumb::after {
      content: "更换";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(10,10,10,.62);
      font-size: 11px;
      font-weight: 900;
      opacity: 0;
      transition: opacity 150ms var(--rf-ease);
    }

    .rf-thumb:hover::after { opacity: 1; }
    .rf-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 0 9px;
      color: var(--rf-black);
      background: #eee;
      border: 1px solid var(--rf-border);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .rf-slider-row {
      display: grid;
      gap: 10px;
      padding: 12px;
      background:
        linear-gradient(90deg, rgba(255,53,48,.055), transparent 42%),
        #fff;
      border: 1px solid var(--rf-border);
      border-left: 4px solid var(--score-color, var(--rf-red));
      border-radius: 5px;
    }

    .rf-slider-main {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 54px;
      gap: 12px;
      align-items: center;
    }

    .rf-slider-label {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .rf-slider-label strong {
      font-size: 12px;
      font-weight: 950;
    }

    .rf-slider-label span {
      color: var(--rf-ink-soft);
      font-size: 10px;
      line-height: 1.25;
    }

    .rf-note-input {
      width: 100%;
      min-height: 38px;
      padding: 8px 9px;
      color: var(--rf-black);
      background: #f8f8f8;
      border: 1px solid #e1e1e1;
      border-radius: 4px;
      outline: none;
      resize: vertical;
      font-size: 12px;
      line-height: 1.45;
      transition: border-color 150ms var(--rf-ease), background 150ms var(--rf-ease), box-shadow 150ms var(--rf-ease);
    }

    .rf-note-input:focus {
      background: #fff;
      border-color: var(--rf-black);
      box-shadow: 0 0 0 3px rgba(255,53,48,.10);
    }

    .rf-range {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      outline: none;
      appearance: none;
      background: linear-gradient(90deg, var(--score-color, var(--rf-red)) calc(var(--value, 0) * 10%), #dedede 0);
    }

    .rf-range::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--score-color, var(--rf-red));
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--rf-black), 0 3px 8px rgba(10,10,10,.2);
      transition: transform 150ms var(--rf-ease);
    }

    .rf-range::-webkit-slider-thumb:hover,
    .rf-range:active::-webkit-slider-thumb { transform: scale(1.18); }
    .rf-range::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: var(--score-color, var(--rf-red));
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--rf-black), 0 3px 8px rgba(10,10,10,.2);
    }

    .rf-score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      color: #fff;
      background: var(--score-color, var(--rf-red));
      border: 1px solid var(--rf-black);
      border-radius: 4px;
      box-shadow: 2px 2px 0 var(--rf-black);
      font-size: 15px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      transition: transform 150ms var(--rf-ease), background 150ms var(--rf-ease);
    }

    .rf-score-pill.bump { animation: rf-bump 220ms var(--rf-ease); }

    .rf-export-button {
      width: 100%;
      min-height: 52px;
      color: var(--rf-white);
      background: var(--rf-red);
      border: 1px solid var(--rf-red);
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 950;
      text-transform: uppercase;
      box-shadow: var(--rf-shadow-hard);
      transition: transform 150ms var(--rf-ease), box-shadow 150ms var(--rf-ease), background 150ms var(--rf-ease), border-color 150ms var(--rf-ease);
    }

    .rf-export-button:hover {
      background: var(--rf-black);
      border-color: var(--rf-black);
      transform: translate(-2px, -2px);
      box-shadow: 10px 10px 0 rgba(10,10,10,0.95);
    }

    .rf-export-button:active {
      transform: translate(1px, 1px) scale(.992);
      box-shadow: 4px 4px 0 rgba(10,10,10,0.95);
    }

    .rf-export-button.is-loading {
      background: #555;
      border-color: #555;
      box-shadow: 4px 4px 0 rgba(10,10,10,0.95);
      cursor: wait;
    }

    .rf-preview-area {
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 28px;
    }

    .rf-preview-shell {
      width: fit-content;
      margin: 0 auto;
    }

    .rf-preview-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      color: var(--rf-ink-muted);
      font-size: 11px;
      font-weight: 900;
    }

    #export-node {
      width: 800px;
      min-height: 1080px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #e4e4e4;
      box-shadow: 0 30px 70px rgba(10,10,10,0.2);
      transform-origin: top center;
      transition: opacity 220ms var(--rf-ease), transform 220ms var(--rf-ease);
    }

    #export-node.is-refreshing {
      opacity: .96;
      transform: translateY(2px);
    }

    .magazine-text {
      text-align: justify;
      text-justify: inter-character;
      hyphens: auto;
    }

    .safe-wrap {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .rf-export-page {
      position: relative;
      width: 800px;
      padding: 54px 56px 66px;
      color: var(--rf-black);
      background:
        radial-gradient(circle at 0 0, rgba(255,53,48,.045), transparent 240px),
        linear-gradient(90deg, rgba(10,10,10,.035) 1px, transparent 1px) 0 0 / 40px 40px,
        #fff;
    }

    .rf-export-page::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 12px;
      background: var(--rf-red);
    }

    .rf-export-brandline {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      padding-top: 20px;
      padding-bottom: 24px;
      border-bottom: 5px solid var(--rf-black);
      font-weight: 950;
      text-transform: uppercase;
    }

    .rf-export-brandline span:first-child {
      font-size: 34px;
      line-height: 1;
      letter-spacing: .01em;
    }

    .rf-avatar-gallery h4 {
      margin: 0 0 12px;
      color: var(--rf-ink-muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }

    .rf-avatar-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .rf-avatar-strip img {
      width: 84px;
      height: 106px;
      object-fit: cover;
      padding: 3px;
      background: #fff;
      border: 1px solid #d6d6d6;
      box-shadow: 3px 3px 0 #111;
    }

    .rf-avatar-strip.ntr img {
      filter: grayscale(1);
      opacity: .86;
    }

    .rf-upcoming-copy {
      margin-top: 20px;
      color: #303030;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: 18px;
      line-height: 1.95;
    }

    .rf-toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 70;
      display: none;
      align-items: center;
      gap: 12px;
      max-width: 360px;
      padding: 12px 13px;
      color: #fff;
      background: var(--rf-black);
      border: 1px solid #000;
      border-radius: var(--rf-radius);
      box-shadow: 0 16px 36px rgba(10,10,10,.28);
      font-weight: 850;
    }

    .rf-toast.show { display: flex; animation: rf-enter 220ms var(--rf-ease) both; }
    .rf-toast button {
      color: var(--rf-white);
      background: var(--rf-red);
      border: 0;
      border-radius: 4px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
    }

    .is-hidden { display: none !important; }

    .is-exporting *,
    .is-exporting *::before,
    .is-exporting *::after {
      animation: none !important;
      transition: none !important;
    }

    @keyframes rf-enter {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes rf-bump {
      0% { transform: scale(1); }
      45% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes rf-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: .72; }
    }

    .rf-spin { animation: rf-spin 850ms linear infinite; }
    @keyframes rf-spin { to { transform: rotate(360deg); } }

    @media (max-width: 1200px) {
      .rf-layout {
        grid-template-columns: 1fr;
      }
      .rf-workbench {
        position: relative;
        top: auto;
        max-height: none;
      }

    @media (max-width: 780px) {

      .rf-layout {

      }
      .rf-preview-meta {

        flex-direction: column;
      }
    }

</head>

              </div>
              <div class="rf-field" style="margin-top:12px;">

              </div>
              <div class="rf-grid-2" style="margin-top:12px;">
                <div class="rf-field">
                  <label for="albumGenre">流派</label>

                <div class="rf-field" style="grid-column:1/-1;">

              <div class="rf-field">
                <label for="vnLength">体量</label>
                <input type="text" id="vnLength" oninput="updateState('vnLength', this.value)" class="rf-input" />
              </div>
              <div class="rf-field">

          <span>800px Export Canvas</span>

        </div>
        <div id="export-node"></div>
      </div>
    </section>

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    const attr = escapeHtml;
    const clamp = (value, min = 0, max = 10) => Math.min(max, Math.max(min, Number(value) || 0));
    const average = (values) => values.length ? values.reduce((acc, val) => acc + clamp(val), 0) / values.length : 0;

    function imageAttrs(src) {
      const safeSrc = attr(src || '');
      const cors = src && !String(src).startsWith('data:') && !String(src).startsWith('blob:') ? ' crossorigin="anonymous"' : '';
      return `src="${safeSrc}"${cors}`;
    }

    function imageTag(src, className, altText = '') {
      if (!src) return '';
      return `<img ${imageAttrs(src)} class="${className}" alt="${attr(altText)}" />`;
    }

    function getFinalScore() {
      if (state.mode === 'upcoming') return '-.-';
      if (state.mode === 'album') {
        return state.tracks.length ? average(state.tracks.map((track) => track.score)).toFixed(1) : '0.0';
      }
      if (state.mode === 'vn') {
        return average(Object.values(state.vnScores)).toFixed(1);
      }
      return average(Object.values(state.studioScores)).toFixed(1);
    }

    function getScoreTone(score) {
      const value = Number(score);
      if (Number.isNaN(value)) return { color: '#0a0a0a', label: 'PREVIEW', grade: 'UNRATED' };
      if (value >= 9.0) return { color: '#ff3530', label: 'MASTERPIECE', grade: 'S' };
      if (value >= 8.5) return { color: '#ff3530', label: 'ESSENTIAL', grade: 'A+' };
      if (value >= 8.0) return { color: '#d92d29', label: 'STRONG', grade: 'A' };
      if (value >= 7.0) return { color: '#0a0a0a', label: 'GOOD', grade: 'B' };
      if (value >= 6.0) return { color: '#555555', label: 'MIXED', grade: 'C' };
      return { color: '#777777', label: 'WEAK', grade: 'D' };
    }

    function getGradeTone(grade) {
      const upper = String(grade || '').trim().toUpperCase();
      if (upper.startsWith('S') || upper.startsWith('A')) return '#ff3530';
      if (upper.startsWith('B')) return '#0a0a0a';
      return '#666666';
    }

    function toDateInputValue(value) {
      const raw = String(value || '').trim();
      const match = raw.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
      if (!match) return '';
      const [, year, month, day] = match;
      return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
    }

    function formatDateFromInput(value) {
      const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return value || '';
      const [, year, month, day] = match;
      return `${year}年${Number(month)}月${Number(day)}日`;
    }

      const undoButton = $('toast-undo');
      if (undoButton) {
        undoButton.onclick = () => {

      const min = range.min;

      const fill = ((next - min) / (max - min)) * 10;

      const list = getCharacterList(type);
      const newId = list.length ? Math.max(...list.map((item) => item.id)) + 1 : 1;

      setCharacterList(type, [...list, { id: newId, name: `${label}${newId}`, comment: '在这里写人物评语。', imageUrl: '' }]);

      renderPreview();
      showToast(`已添加${label}`);

      setCharacterList(type, getCharacterList(type).filter((item) => item.id !== id));
      renderDynamicControls();
      renderPreview();
      showToast('已删除人物', () => {
        setCharacterList(type, previous);
        renderDynamicControls();
        renderPreview();
      });

    function structuredCloneSafe(value) {
      if (window.structuredClone) return window.structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }

    function reorderArray(array, sourceId, targetId) {
      const from = array.findIndex((item) => item.id === sourceId);
      const to = array.findIndex((item) => item.id === targetId);
      if (from < 0 || to < 0 || from === to) return array;
      const next = [...array];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    }

    window.dragStart = (event, list, id) => {
      dragContext = { list, id };
      event.dataTransfer.effectAllowed = 'move';
      event.currentTarget.classList.add('is-dragging');
    };

      event.currentTarget.classList.remove('is-dragging');
      document.querySelectorAll('.is-drop-target').forEach((node) => node.classList.remove('is-drop-target'));
      dragContext = null;
    };

    window.dragOver = (event) => {
      event.preventDefault();
      event.currentTarget.classList.add('is-drop-target');
    };

    window.dragLeave = (event) => {
      event.currentTarget.classList.remove('is-drop-target');
    };

    function pointAt(cx, cy, radius, index, total) {
      const angle = -Math.PI / 2 + (index * 2 * Math.PI) / total;
      return {
        x: cx + radius * Math.cos(angle),
        y: cy + radius * Math.sin(angle),
        angle
      };
    }

    function pointsString(points) {
      return points.map((point) => `${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(' ');
    }

    function parsePointsString(points) {
      return String(points || '').split(' ').map((pair) => {
        const [x, y] = pair.split(',').map(Number);
        return { x, y };
      });
    }

    function svgRingPath(cx, cy, outerR, innerR) {
      return [
        `M ${cx - outerR} ${cy}`,
        `a ${outerR} ${outerR} 0 1 0 ${outerR * 2} 0`,
        `a ${outerR} ${outerR} 0 1 0 ${-outerR * 2} 0`,
        `M ${cx - innerR} ${cy}`,
        `a ${innerR} ${innerR} 0 1 1 ${innerR * 2} 0`,
        `a ${innerR} ${innerR} 0 1 1 ${-innerR * 2} 0`
      ].join(' ');
    }

    function scorePillDataUri(score, color) {
      const safeScore = String(score || '');
      const safeColor = /^#[0-9a-f]{3,8}$/i.test(color) ? color : '#ff3530';
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="78" height="38" viewBox="0 0 78 38">
          <rect x="4" y="5" width="72" height="33" rx="16.5" fill="#0a0a0a" opacity=".13" />
          <rect x="0" y="0" width="70" height="34" rx="17" fill="${safeColor}" />
          <path d="M16 5 H54 A12 12 0 0 1 66 17 A12 12 0 0 1 54 29 H16 A12 12 0 0 1 4 17 A12 12 0 0 1 16 5 Z" fill="none" stroke="#fff" stroke-width="2" />
          <text x="35" y="25.2" text-anchor="middle" fill="#fff" font-family="Arial Rounded MT Bold, Trebuchet MS, Arial, sans-serif" font-size="23" font-weight="900" letter-spacing=".02">${safeScore}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
    }

    function renderRadarChart(dimensions, scores, options = {}) {
      const mode = options.mode || state.mode;
      const notes = options.notes || {};
      const viewW = 760;
      const viewH = 720;
      const cx = 380;
      const cy = 370;
      const chartScale = Math.min(1.75, Math.max(0.85, Number(state.radarScale || 1)));
      const labelScale = Math.min(2.4, Math.max(0.8, Number(state.radarLabelScale || 1)));
      const maxR = 160 * chartScale;
      const labelR = maxR + (44 * labelScale);
      const radarOrder = mode === 'vn'
        ? ['story', 'interaction', 'angst', 'stealth', 'practicality']
        : dimensions.map((dim) => dim.key);
      const plotDimensions = radarOrder.map((key) => dimensions.find((dim) => dim.key === key)).filter(Boolean);
      const total = plotDimensions.length;
      const startAngle = -Math.PI / 2;
      const finalScore = average(dimensions.map((dim) => scores[dim.key]));
      const finalTone = getScoreTone(finalScore);
      const chartId = `rf-radar-${mode}`;
      const animateSvg = !state.isExporting;
      const listWidth = Math.min(460, Math.max(220, Number(state.radarListWidth || 280)));
      const chartColumn = Math.max(280, 738 - 12 - listWidth);
      const pillScale = Math.min(1.8, Math.max(0.85, Number(state.radarPillScale || 1)));
      const listTextScale = Math.min(1.35, Math.max(0.85, Number(state.radarListTextScale || 1)));
      const metricTone = (score) => {
        if (score >= 8.5) return { color: '#ff3530', className: 'is-hot' };
        if (score >= 8) return { color: '#e1322d', className: 'is-strong' };
        if (score < 5) return { color: '#333333', className: 'is-low' };
        if (score < 6) return { color: '#666666', className: 'is-low' };
        return { color: '#0a0a0a', className: 'is-neutral' };
      };
      const polar = (radius, index) => {
        const angle = startAngle - (index * 2 * Math.PI) / total;
        return {
          x: cx + radius * Math.cos(angle),
          y: cy + radius * Math.sin(angle),
          angle
        };
      };
      const dataPoints = plotDimensions.map((dim, index) => {
        const score = clamp(scores[dim.key]);
        const pos = polar(maxR * (score / 10), index);
        return { ...pos, score, dim };
      });
      const dataPointString = pointsString(dataPoints);
      const previousPointString = radarCache[mode] || dataPointString;
      const previousPoints = parsePointsString(previousPointString);
      radarCache[mode] = dataPointString;
      const dataAnimations = animateSvg
        ? `<animate attributeName="points" from="${previousPointString}" to="${dataPointString}" dur="260ms" fill="freeze" />`
        : '';

      const rings = [2, 4, 6, 8, 10].map((tick) => {
        const radius = maxR * (tick / 10);
        const isOuter = tick === 10;
        return `
          <circle cx="${cx}" cy="${cy}" r="${radius.toFixed(2)}" fill="none" stroke="${isOuter ? '#111' : '#d2d2d2'}" stroke-opacity="${isOuter ? '.92' : '.72'}" stroke-width="${isOuter ? 2.35 : 1.05}" vector-effect="non-scaling-stroke" />
        `;
      }).join('');

      const axes = plotDimensions.map((dim, index) => {
        const end = polar(maxR, index);
        return `<line x1="${cx}" y1="${cy}" x2="${end.x.toFixed(2)}" y2="${end.y.toFixed(2)}" stroke="#b9b9b9" stroke-width=".85" opacity=".62" vector-effect="non-scaling-stroke" />`;
      }).join('');

      const tickMarks = [2, 4, 6, 8, 10].map((tick) => {
        const radius = maxR * (tick / 10);
        const tickPos = polar(radius, 0);
        const x = tickPos.x + 3;
        const y = tickPos.y + 6;
        return `
          <g class="rf-radar-tick">
            <text x="${x.toFixed(2)}" y="${y.toFixed(2)}" fill="${tick === 10 ? '#111' : '#777'}" font-size="8.8" font-weight="850" text-anchor="middle" dominant-baseline="central">${tick}</text>
          </g>
        `;
      }).join('');

      const labels = plotDimensions.map((dim, index) => {
        const score = clamp(scores[dim.key]);
        const tone = metricTone(score);
        const labelPos = polar(labelR, index);
        const anchor = Math.abs(labelPos.x - cx) < 8 ? 'middle' : (labelPos.x > cx ? 'start' : 'end');
        const scoreY = 18 + (18 * labelScale);
        const label = {
          x: labelPos.x,
          y: labelPos.y,
          anchor
        };
        return `
          <g class="rf-radar-label" style="--metric-color:${tone.color};" transform="translate(${label.x.toFixed(2)}, ${label.y.toFixed(2)})">
            <text class="code" text-anchor="${label.anchor}" y="-14">${escapeHtml(dim.code)}</text>
            <text class="name" text-anchor="${label.anchor}" y="0">${escapeHtml(dim.labelFull)}</text>
            <text class="score" text-anchor="${label.anchor}" y="${scoreY.toFixed(2)}">${score.toFixed(1)}</text>
          </g>
        `;
      }).join('');

      const legend = plotDimensions.map((dim) => {
        const score = clamp(scores[dim.key]);
        const tone = metricTone(score);
        const note = notes[dim.key] || dim.desc;
        return `
          <div class="rf-radar-legend-item ${tone.className}" style="--score-color:${tone.color};">
            <div>
              <strong>${escapeHtml(dim.labelFull)}</strong>
              <em>${escapeHtml(dim.code)}</em>
              <span>${escapeHtml(note)}</span>
            </div>
            <img class="rf-radar-score-pill" src="${scorePillDataUri(score.toFixed(1), tone.color)}" alt="${escapeHtml(dim.labelFull)}评分 ${score.toFixed(1)}">
          </div>
        `;
      }).join('');

      return `
        <section class="rf-radar-card" style="--score-color:${finalTone.color};--radar-list-width:${listWidth}px;--radar-chart-column:${chartColumn}px;--radar-pill-scale:${pillScale};--radar-list-text-scale:${listTextScale};">
          <div class="rf-radar-head">
            <div class="rf-radar-title">
              <h3>${escapeHtml(options.title || '维度评分 / RADAR ANALYSIS')}</h3>
              <small>Five-axis review metric system</small>
            </div>
            <span>${finalScore.toFixed(2)} / 10</span>
          </div>
          <div class="rf-radar-grid">
            <div class="rf-radar-visual">
              <svg class="rf-radar-svg" viewBox="0 0 ${viewW} ${viewH}" style="--radar-label-scale:${labelScale};" role="img" aria-label="圆形雷达评分图">
                <defs>
                  <filter id="${chartId}-glow" x="-14%" y="-14%" width="128%" height="128%">
                    <feGaussianBlur stdDeviation="1.8" result="blur" />
                    <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0 0 0 .18 0 0 0 0 .16 0 0 0 .14 0" result="redBlur" />
                    <feMerge>
                      <feMergeNode in="redBlur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>
                <path d="${svgRingPath(cx, cy, maxR, maxR * .8)}" fill="rgba(255,53,48,.028)" fill-rule="evenodd" />
                ${rings}
                ${axes}
                <line x1="${cx}" y1="${cy}" x2="${polar(maxR, 0).x.toFixed(2)}" y2="${polar(maxR, 0).y.toFixed(2)}" stroke="#cfcfcf" stroke-width=".62" opacity=".54" vector-effect="non-scaling-stroke" />
                <polygon class="rf-radar-polygon" points="${dataPointString}" fill="rgba(255,53,48,${finalScore >= 8 ? '.31' : '.27'})" stroke="#ff3530" stroke-opacity=".74" stroke-width="2.05" stroke-linejoin="miter" stroke-miterlimit="10" vector-effect="non-scaling-stroke">
                  ${dataAnimations}
                </polygon>
                ${tickMarks}
                ${labels}
              </svg>
            </div>
            <div class="rf-radar-legend">${legend}</div>
          </div>
        </section>
      `;
    }

    function renderExportBrand(issueLabel) {
      return `
        <div class="rf-export-brandline">
          <span>NTRGAME REVIEW</span>
          <span>${escapeHtml(issueLabel || '')}</span>

    function renderScoreDial(finalScore, subtitle) {
      const tone = getScoreTone(finalScore);
      const numericScore = Number(finalScore);
      const crown = numericScore >= 8.5 ? `
        <svg class="rf-score-crown" viewBox="0 0 90 38" aria-hidden="true">
          <path d="M7 34 L16 10 L34 30 L45 4 L56 30 L74 10 L83 34 Z" fill="var(--score-color)" stroke="var(--score-color)" stroke-width="4" stroke-linejoin="round" />
          <path d="M14 34 H76" stroke="var(--score-color)" stroke-width="5" stroke-linecap="square" />

      ` : '<div style="height:41px;"></div>';
      return `
        <aside class="rf-score-dial" style="--score-color:${tone.color};">
          ${crown}
          <svg class="rf-score-circle" viewBox="0 0 190 190" role="img" aria-label="作品评分 ${escapeHtml(finalScore)}">
            <circle cx="95" cy="95" r="82" fill="#fff" stroke="var(--score-color)" stroke-width="14" />
            <circle cx="95" cy="95" r="73" fill="none" stroke="var(--score-color)" stroke-width="3" opacity=".35" />

    function renderMetaCell(label, value) {

    function renderParagraphs(text, className = '') {
      return String(text || '').split('\n').filter((paragraph) => paragraph.trim()).map((paragraph) => `<p class="${className} safe-wrap">${escapeHtml(paragraph)}</p>`).join('');
    }

    function renderReviewText(text) {
      return `<div class="rf-review-text safe-wrap">${escapeHtml(text || '')}</div>`;
    }

    function reachesNumber(value, threshold) {
      const matches = String(value || '').match(/\d+(?:\.\d+)?/g);
      if (!matches) return false;
      return matches.some((item) => Number(item) >= threshold);
    }

    function renderUpcomingPreview() {

      const listHtml = groups.map((group) => `

          ${group.items.map((item) => {
            const grade = String(item.score || 'B').trim().toUpperCase();
            const gradeColor = getGradeTone(grade);
            const heroineGallery = (item.heroineImgUrls || []).length ? `

                <h4>女主一览 / ${escapeHtml(item.heroineCount || (item.heroineImgUrls || []).length)}</h4>

              </div>
            ` : '';
            const ntrGallery = (item.ntrImgUrls || []).length ? `
              <div class="rf-avatar-gallery">
                <h4>间男一览 / ${escapeHtml(item.ntrCount || (item.ntrImgUrls || []).length)}</h4>
                <div class="rf-avatar-strip ntr">${item.ntrImgUrls.map((url, index) => imageTag(url, '', `${item.title} 间男 ${index + 1}`)).join('')}</div>
              </div>
            ` : '';
            const cover = item.coverUrl ? `
              <figure class="rf-upcoming-cover">
                ${imageTag(item.coverUrl, '', item.title)}
              </figure>
            ` : '';
            return `
              <article class="rf-upcoming-item" style="--score-color:${gradeColor};">
                <aside class="rf-rank-column">
                  <div class="rf-rank">#${rank++}</div>
                  <div class="rf-grade-box">
                    <span>预测品质</span>
                    <strong>${escapeHtml(grade)}</strong>
                  </div>
                  <div class="rf-grade-box rf-date-box">
                    <span>发售定档</span>
                    <strong class="safe-wrap">${escapeHtml(item.date || '未知')}</strong>
                  </div>
                </aside>
                <div class="rf-upcoming-main">
                  <h3 class="safe-wrap">${escapeHtml(item.title)}</h3>
                  <div class="rf-upcoming-dev safe-wrap">${escapeHtml(item.developer || '未知社团')}</div>
                  ${cover}
                  <div class="rf-upcoming-stats">
                    <div><span>牛油类型</span><strong class="safe-wrap">${escapeHtml(item.vnType || '-')}</strong></div>
                    <div><span>牛油体量</span><strong class="safe-wrap">${escapeHtml(item.length || '-')}</strong></div>
                    <div><span>场景数量</span><strong class="safe-wrap">${escapeHtml(item.sceneCount || '-')}</strong></div>
                    <div><span>CG 总数</span><strong class="safe-wrap">${escapeHtml(item.cgCount || '-')}</strong></div>
                  </div>
                  ${heroineGallery}
                  ${ntrGallery}
                  <div class="rf-upcoming-copy magazine-text">${renderParagraphs(item.description)}</div>
                </div>
              </article>
            `;
          }).join('')}
        </section>
      `).join('');

      return `
        <div class="rf-export-page rf-upcoming-page">
          ${renderExportBrand('Upcoming Issue')}
          <div class="rf-upcoming-issue">
            <div>
              <div class="rf-export-kicker">Annual Watchlist</div>
              <h1 class="safe-wrap">${escapeHtml(state.upcomingTitle || '年度期待榜单')}</h1>
              <p class="rf-export-subtitle safe-wrap">${escapeHtml(state.upcomingSubtitle || '特稿精选')}</p>
            </div>
            <aside>
              策划 / ${escapeHtml(state.author)}<br />
              发布 / ${escapeHtml(state.reviewDate)}<br />
              NTRGAME-2026
            </aside>
          </div>
          ${listHtml}
        </div>
      `;

    function renderRegularPreview() {
      const finalScore = getFinalScore();
      const scoreNum = Number(finalScore) || 0;
      const tone = getScoreTone(scoreNum);
      let title = '';
      let subtitle = '';
      let year = '';
      let issue = '';
      let kicker = '';
      let scoreSubtitle = tone.grade;

      if (state.mode === 'album') {
        title = state.albumTitle;
        subtitle = state.artist;
        year = state.albumYear;
        issue = 'Album Archive';
        kicker = 'Album Review';
        scoreSubtitle = scoreNum >= 8.3 ? 'BEST NEW MUSIC' : 'TRACK SCORE';
      }
      if (state.mode === 'vn') {
        title = state.vnTitle;
        subtitle = state.developer;
        year = state.vnYear;
        issue = 'NTRGAME REVIEW';
        kicker = 'NTRGAME REVIEW';
        scoreSubtitle = '';
      }
      if (state.mode === 'studio') {
        title = state.studioName;
        subtitle = '社团综合实力分析';
        year = `${state.studioYear} 至今`;
        issue = 'Studio Archive';
        kicker = 'Studio Report';

      }

        <section class="rf-review-body magazine-text">

      return `
        <div class="rf-export-page">

          <div class="rf-export-kicker compact" aria-hidden="true"></div>

          <p class="rf-export-subtitle safe-wrap">${escapeHtml(subtitle || '匿名制作')}</p>
          <div class="rf-export-meta-row">
            <span><b>Editor</b> / ${escapeHtml(state.author)}</span>
            <span><b>Date</b> / ${escapeHtml(state.reviewDate)}</span>
            <span><b>Year</b> / ${escapeHtml(year)}</span>

          <section class="rf-export-hero">
            <figure class="${coverClass}">

                <span>H-Scenes / 场景数</span>
                <strong class="safe-wrap">${escapeHtml(state.vnHScenes || '-')}</strong>
              </div>
              <div class="rf-vn-spec-item tags">
                <span>Tags / 标签</span>
                <strong class="safe-wrap">${escapeHtml(state.vnTags || '-').replace(/\n/g, '<br>')}</strong>
              </div>
            </div>
          </section>
          <section class="rf-vn-subspec">
            ${renderMetaCell('有无动态', state.vnAnimated)}
            ${renderMetaCell('有无配音/语音', state.vnVoiced)}
            ${renderMetaCell('有无回想', state.vnGallery)}
          </section>
        `;
      }

      const ratingParts = String(state.studioRating || '').split('/');
      const mainGrade = ratingParts[0]?.trim() || '-';
      const subGrade = ratingParts.slice(1).join('/').trim();
      const repCover = state.studioRepCover ? `
        <div style="display:flex;gap:14px;align-items:center;">
          <div style="width:88px;height:66px;border:1px solid var(--rf-border);padding:3px;background:#fff;flex:0 0 auto;">${imageTag(state.studioRepCover, '', state.studioRep)}</div>
          <strong class="safe-wrap">${escapeHtml(state.studioRep)}</strong>
        </div>
      ` : `<strong class="safe-wrap">${escapeHtml(state.studioRep)}</strong>`;

      return `
        <section class="rf-meta-grid">
          ${renderMetaCell('核心强项', state.studioNtrType)}
          ${renderMetaCell('运转状态', state.studioStatus)}
          <div class="rf-meta-cell">
            <span>社团评级</span>
            <strong class="safe-wrap" style="color:var(--rf-red);font-size:38px;">${escapeHtml(mainGrade)}</strong>
            ${subGrade ? `<div class="safe-wrap" style="margin-top:8px;font-size:16px;font-weight:900;">${escapeHtml(subGrade)}</div>` : ''}
          </div>
          <div class="rf-meta-cell">
            <span>代表作</span>

          </div>
        </section>

    function renderCharacterCards(list, type) {

          : '<span class="rf-character-placeholder">Upload<br>Portrait</span>';

            <div class="rf-character-image">${image}</div>
            <h4 class="safe-wrap">${escapeHtml(person.name || '未命名人物')}</h4>
            <p class="safe-wrap">${escapeHtml(person.comment || '暂无人物评语。')}</p>
          </article>
        `;
      }).join('');

    function renderVnCharacterDirectory() {
      const heroines = state.vnHeroines || [];
      const ntrs = state.vnNtrCharacters || [];
      if (!heroines.length && !ntrs.length) return '';
      return `
        <section class="rf-character-directory">
          ${heroines.length ? `
            <div class="rf-directory-section" style="--dir-color:var(--rf-red);--dir-text:var(--rf-red);--dir-cols:3;--char-ratio:3 / 4;">
              <div class="rf-directory-heading"><span>HEROINES DIRECTORY / 女主一览</span></div>
              <div class="rf-directory-grid">${renderCharacterCards(heroines, 'heroine')}</div>
            </div>
          ` : ''}
          ${ntrs.length ? `
            <div class="rf-directory-section" style="--dir-color:var(--rf-black);--dir-text:#555;--dir-cols:4;--char-ratio:1 / 1;">
              <div class="rf-directory-heading"><span>TARGETS & ANTAGONISTS / 间男一览</span></div>
              <div class="rf-directory-grid">${renderCharacterCards(ntrs, 'ntr')}</div>
            </div>
          ` : ''}
        </section>
      `;

    function renderChartSection() {
      if (state.mode === 'album') {
        const rows = state.tracks.map((track, index) => `
          <div class="rf-track-row">
            <span class="index">${String(index + 1).padStart(2, '0')}</span>
            <strong class="safe-wrap">${escapeHtml(track.name)}</strong>
            <b>${clamp(track.score).toFixed(1)}</b>
          </div>
        `).join('');
        return `
          <section>
            <div class="rf-section-rule"><span>Track Assessment</span><span>${state.tracks.length} Cuts</span></div>
            <div class="rf-track-list">${rows}</div>
          </section>
        `;
      }

      if (state.mode === 'vn') {
        return `
          ${renderVnCharacterDirectory()}
          ${renderRadarChart(vnDimensions, state.vnScores, { mode: 'vn', title: '维度评分 / RADAR ANALYSIS', notes: state.vnScoreNotes })}
        `;
      }

      const radar = renderRadarChart(studioDimensions, state.studioScores, { mode: 'studio', title: '社团维度 / RADAR ANALYSIS', notes: state.studioScoreNotes });
      const works = state.studioWorks.slice().sort((a, b) => parseInt(a.year || 0, 10) - parseInt(b.year || 0, 10)).map((work) => {
        const tone = getGradeTone(work.rating);
        const cover = work.coverUrl ? imageTag(work.coverUrl, '', work.name) : '<div class="no-img">暂无配图</div>';
        return `
          <div class="rf-work-row" style="--score-color:${tone};">
            ${cover}
            <span class="year">${escapeHtml(work.year)}</span>
            <span class="name safe-wrap">${escapeHtml(work.name)}</span>
            <span class="rating safe-wrap">${escapeHtml(work.rating || '-')}</span>
          </div>

      }).join('');

      return `
        ${radar}
        <section>
          <div class="rf-section-rule"><span>精选作品履历</span><span>${state.studioWorks.length} Titles</span></div>
          <div class="rf-discography">${works}</div>
        </section>

    function renderPreview(options = {}) {
      const exportNode = $('export-node');
      if (!exportNode) return;
      const finalScore = getFinalScore();
      updateControlScore(finalScore);
      const animate = Boolean(options.animate);
      if (animate) exportNode.classList.add('is-refreshing');
      exportNode.innerHTML = state.mode === 'upcoming' ? renderUpcomingPreview() : renderRegularPreview();
      requestAnimationFrame(() => {
        if (animate) {
          exportNode.classList.remove('is-refreshing');
          runGsapPreviewIntro();
        } else {
          runGsapMicroUpdate();
        }
      });
    }

    function runGsapMicroUpdate() {
      if (state.isExporting || document.body.classList.contains('is-exporting')) return;
      if (typeof window.gsap !== 'object') return;
      const exportNode = $('export-node');
      if (!exportNode) return;
      const gsap = window.gsap;
      const localTargets = exportNode.querySelectorAll('.rf-score-circle, .rf-radar-polygon, .rf-radar-score-pill');
      if (!localTargets.length) return;
      gsap.fromTo(localTargets, { opacity: .88 }, {
        opacity: 1,
        duration: .22,
        ease: 'power1.out',
        stagger: .012,
        overwrite: true
      });
    }

    function runGsapPreviewIntro(options = {}) {
      if (!options.force && (state.isExporting || document.body.classList.contains('is-exporting'))) return null;
      if (typeof window.gsap !== 'object') return null;
      const exportNode = $('export-node');
      if (!exportNode) return null;
      const root = exportNode.querySelector('.rf-export-page') || exportNode;
      if (previewTimeline) previewTimeline.kill();

      const gsap = window.gsap;
      const titleSet = root.querySelectorAll('.rf-export-brandline, .rf-export-kicker, .rf-export-title, .rf-export-subtitle, .rf-export-meta-row');
      const featureSet = root.querySelectorAll('.rf-export-hero, .rf-score-dial, .rf-radar-card, .rf-info-strip, .rf-info-grid, .rf-directory-section');
      const radarPoly = root.querySelector('.rf-radar-polygon');
      const radarDetails = root.querySelectorAll('.rf-radar-legend-item');
      const bodyItems = root.querySelectorAll('.rf-review-text p, .rf-work-row, .rf-upcoming-item, .rf-directory-card, .rf-avatar-card');

      previewTimeline = gsap.timeline({
        paused: Boolean(options.paused),
        defaults: { ease: 'power3.out' }
      });
      previewTimeline.fromTo(titleSet, { y: 18, opacity: 0 }, { y: 0, opacity: 1, duration: .55, stagger: .045 }, 0);
      previewTimeline.fromTo(featureSet, { y: 28, opacity: 0 }, { y: 0, opacity: 1, duration: .68, stagger: .07 }, .12);
      if (root.querySelector('.rf-score-circle')) {
        previewTimeline.fromTo(root.querySelector('.rf-score-circle'), { scale: .86, rotate: -5, opacity: .7 }, { scale: 1, rotate: 0, opacity: 1, duration: .72 }, .26);
      }
      if (radarPoly) {
        gsap.set(radarPoly, { transformBox: 'fill-box', transformOrigin: '50% 50%' });
        previewTimeline.fromTo(radarPoly, { opacity: 0 }, { opacity: 1, duration: .72, ease: 'power2.out' }, .32);
      }
      previewTimeline.fromTo(radarDetails, { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: .5, stagger: .035 }, .58);
      previewTimeline.fromTo(bodyItems, { y: 16, opacity: 0 }, { y: 0, opacity: 1, duration: .55, stagger: .045 }, .72);
      if (!options.paused) previewTimeline.play(0);
      return previewTimeline;
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function inlineCloneImages(clone) {
      const images = Array.from(clone.querySelectorAll('img'));
      await Promise.all(images.map(async (img) => {
        const src = img.getAttribute('src');
        if (!src || src.startsWith('data:')) return;
        try {
          const response = await fetch(src, { mode: 'cors', cache: 'force-cache' });
          if (!response.ok) throw new Error(`image ${response.status}`);
          const dataUrl = await blobToDataUrl(await response.blob());
          img.setAttribute('src', dataUrl);
          img.removeAttribute('crossorigin');
        } catch (error) {
          img.removeAttribute('src');
          img.style.background = '#ededed';
        }
      }));
    }

    async function renderNodeToCanvasFallback(node, scale) {
      const rect = node.getBoundingClientRect();
      const width = Math.ceil(rect.width);
      const height = Math.ceil(rect.height);
      const clone = node.cloneNode(true);
      clone.style.boxShadow = 'none';
      await inlineCloneImages(clone);

      const styles = Array.from(document.querySelectorAll('style')).map((style) => style.textContent).join('\n');
      const html = `
        <div xmlns="http://www.w3.org/1999/xhtml">
          <style>${styles}</style>
          ${clone.outerHTML}
        </div>
      `;
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width * scale}" height="${height * scale}" viewBox="0 0 ${width} ${height}">
          <foreignObject width="100%" height="100%">${html}</foreignObject>
        </svg>
      `;
      const image = new Image();
      const svgUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      await new Promise((resolve, reject) => {
        image.onload = resolve;
        image.onerror = reject;
        image.src = svgUrl;
      });
      const canvas = document.createElement('canvas');
      canvas.width = width * scale;
      canvas.height = height * scale;
      const context = canvas.getContext('2d');
      context.fillStyle = '#ffffff';
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      return canvas;
    }

    async function renderExportCanvas(node, config = {}) {
      const scale = config.scale || 3;
      const disableAnimations = config.disableAnimations !== false;
      const options = {
        useCORS: true,
        allowTaint: false,
        backgroundColor: '#ffffff',
        scale,
        imageTimeout: 15000,
        logging: false
      };
      if (disableAnimations) {
        options.onclone = (doc) => doc.body.classList.add('is-exporting');
      }
      if (typeof window.html2canvas === 'function') {
        return window.html2canvas(node, options);
      }
      return renderNodeToCanvasFallback(node, scale);
    }

    function getExportFilename() {
      let filename = '综合测评';
      if (state.mode === 'album') filename = state.albumTitle || '专辑测评';
      if (state.mode === 'vn') filename = state.vnTitle || '单品测评';
      if (state.mode === 'studio') filename = `${state.studioName || '社团'}_实力分析`;
      if (state.mode === 'upcoming') filename = `${state.upcomingTitle || '前瞻'}_新作盘点`;
      return String(filename).replace(/[\\/:*?"<>|]/g, '_').slice(0, 88);
    }

    async function handleExport() {
      if (state.isExporting) return;
      const exportButton = $('btn-export');
      const exportText = $('export-text');
      const exportNode = $('export-node');
      if (!exportNode) {
        alert('导出区域尚未准备完成，请稍后再试。');
        return;
      }

      state.isExporting = true;
      document.body.classList.add('is-exporting');
      exportButton?.classList.add('is-loading');
      exportButton?.setAttribute('disabled', 'disabled');
      exportButton?.setAttribute('aria-busy', 'true');
      if (exportText) exportText.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 rf-spin"></i><span>正在生成排版图</span>';
      createIcons();

      try {
        renderPreview();
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const canvas = await renderExportCanvas(exportNode);

        const link = document.createElement('a');
        let filename = '综合评测';
        if (state.mode === 'album') filename = state.albumTitle || '专辑评测';
        if (state.mode === 'vn') filename = state.vnTitle || '单品评测';
        if (state.mode === 'studio') filename = `${state.studioName || '社团'}_实力分析`;
        if (state.mode === 'upcoming') filename = `${state.upcomingTitle || '前瞻'}_新作盘点`;
        filename = String(filename).replace(/[\\/:*?"<>|]/g, '_').slice(0, 88);

        link.download = `${filename}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('PNG 已生成');
      } catch (error) {
        console.error('导出失败:', error);
        alert(`导出失败：${error?.message || '请确认图片已加载完成，或更换跨域图片后重试。'}`);
      } finally {
        state.isExporting = false;
        document.body.classList.remove('is-exporting');
        exportButton?.classList.remove('is-loading');
        exportButton?.removeAttribute('disabled');
        exportButton?.removeAttribute('aria-busy');
        if (exportText) exportText.textContent = '生成杂志排版图';
        createIcons();
      }
    }

    window.addEventListener('load', () => {
      syncStaticInputs();
      setMode('upcoming');
      createIcons();
    });
  </script>
</body>
</html>
